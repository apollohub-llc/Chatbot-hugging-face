<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Local AI Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            background: #16213e;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #0f3460;
            padding: 1rem;
            text-align: center;
            color: white;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            max-width: 75%;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
        }
        .user {
            background: #e94560;
            color: white;
            align-self: flex-end;
        }
        .bot {
            background: #0f3460;
            color: #e0e0e0;
            align-self: flex-start;
        }
        .input-area {
            padding: 1rem;
            background: #0f3460;
            display: flex;
            gap: 0.5rem;
        }
        input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .status {
            font-size: 0.75rem;
            padding: 0.5rem;
            text-align: center;
            background: #0a0f1c;
            color: #ff9d00;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🤖 Local AI Chatbot</h1>
        <p>100% in your browser • No API • No CORS</p>
    </div>
    <div class="messages" id="messages">
        <div class="message bot">👋 Loading AI model... (one-time download, then cached)</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." disabled>
        <button id="sendBtn" disabled>Send</button>
    </div>
    <div class="status" id="status">⏳ Downloading model...</div>
</div>

<script type="importmap">
    {
        "imports": {
            "@huggingface/transformers": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0"
        }
    }
</script>

<script type="module">
    import { pipeline } from '@huggingface/transformers';
    
    let generator = null;
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    // Load smaller model for faster download (~500MB, but runs locally)
    async function loadModel() {
        try {
            statusDiv.innerHTML = "📦 Downloading AI model (first time only)...";
            generator = await pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0');
            statusDiv.innerHTML = "✅ Ready! Model loaded locally.";
            userInput.disabled = false;
            sendBtn.disabled = false;
            messagesDiv.innerHTML = '<div class="message bot">👋 Hi! Ask me anything. I run entirely in your browser.</div>';
        } catch (err) {
            statusDiv.innerHTML = "❌ Error: " + err.message;
        }
    }
    
    function addMessage(text, isUser) {
        const msg = document.createElement('div');
        msg.className = `message ${isUser ? 'user' : 'bot'}`;
        msg.textContent = text;
        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    async function sendMessage() {
        const userMessage = userInput.value.trim();
        if (!userMessage || !generator) return;
        
        addMessage(userMessage, true);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        
        const typing = document.createElement('div');
        typing.className = 'message bot';
        typing.textContent = '🤔 Thinking...';
        typing.id = 'typing';
        messagesDiv.appendChild(typing);
        
        try {
            const response = await generator(`<|user|>\n${userMessage}\n<|assistant|>\n`, {
                max_new_tokens: 150,
                temperature: 0.7
            });
            document.getElementById('typing')?.remove();
            let reply = response[0].generated_text.split('<|assistant|>\n')[1] || "Sorry, no response.";
            addMessage(reply, false);
        } catch (err) {
            document.getElementById('typing')?.remove();
            addMessage("Error: " + err.message, false);
        }
        
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
    }
    
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !userInput.disabled) sendMessage();
    });
    
    loadModel();
</script>
</body>
</html>
