<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI Chatbot - CORS Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            background: #16213e;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #0f3460;
            padding: 1rem;
            text-align: center;
            color: white;
            border-bottom: 1px solid #e94560;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            max-width: 75%;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            word-wrap: break-word;
        }
        .user {
            background: #e94560;
            color: white;
            align-self: flex-end;
        }
        .bot {
            background: #0f3460;
            color: #e0e0e0;
            align-self: flex-start;
        }
        .input-area {
            padding: 1rem;
            background: #0f3460;
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid #e94560;
        }
        input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .status {
            font-size: 0.75rem;
            padding: 0.5rem;
            text-align: center;
            background: #0a0f1c;
            color: #ff9d00;
        }
        .status.ready { background: #0a5c2e; color: white; }
        .status.error { background: #8b0000; color: white; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🤖 AI Chatbot</h1>
        <p>CORS Proxy Enabled</p>
    </div>
    <div class="messages" id="messages">
        <div class="message bot">👋 Hi! Ask me anything.</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autofocus>
        <button id="sendBtn">Send</button>
    </div>
    <div class="status" id="status">✅ Ready</div>
</div>

<script>
    const HF_TOKEN = "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";
    
    // ✅ Using CORS proxy (corsproxy.io is free, no API key needed)
    const PROXY = "https://corsproxy.io/?";
    const API_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3";
    
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    let isLoading = false;
    
    function addMessage(text, isUser) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
        messageDiv.textContent = text;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function addTypingIndicator() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.textContent = '🤔 Thinking...';
        typingDiv.id = 'typing-indicator';
        messagesDiv.appendChild(typingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function removeTypingIndicator() {
        const typing = document.getElementById('typing-indicator');
        if (typing) typing.remove();
    }
    
    async function sendMessage() {
        const userMessage = userInput.value.trim();
        if (!userMessage || isLoading) return;
        
        userInput.disabled = true;
        sendBtn.disabled = true;
        addMessage(userMessage, true);
        userInput.value = '';
        addTypingIndicator();
        isLoading = true;
        
        try {
            // Request goes through proxy to bypass CORS
            const response = await fetch(`${PROXY}${encodeURIComponent(API_URL)}`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `<s>[INST] ${userMessage} [/INST]`,
                    parameters: {
                        max_new_tokens: 300,
                        temperature: 0.7
                    }
                })
            });
            
            removeTypingIndicator();
            
            if (response.status === 503) {
                throw new Error("Model is loading. Try again in 10 seconds.");
            }
            
            if (!response.ok) {
                throw new Error(`Error ${response.status}`);
            }
            
            const result = await response.json();
            let botReply = result[0]?.generated_text || "No response.";
            botReply = botReply.replace(`<s>[INST] ${userMessage} [/INST]`, '').trim();
            
            addMessage(botReply, false);
            statusDiv.className = "status ready";
            
        } catch (error) {
            removeTypingIndicator();
            addMessage(`❌ ${error.message}`, false);
            statusDiv.className = "status error";
            statusDiv.textContent = error.message;
        } finally {
            isLoading = false;
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }
    
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
