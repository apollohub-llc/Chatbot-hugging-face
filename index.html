<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Your AI Chatbot - Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 95%;
            max-width: 800px;
            height: 85vh;
            background: #16213e;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
        }
        .chat-header {
            background: #0f3460;
            padding: 1.2rem;
            text-align: center;
            color: white;
            border-bottom: 1px solid #e94560;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user {
            background: #e94560;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.3rem;
        }
        .bot {
            background: #0f3460;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 0.3rem;
            white-space: pre-wrap;
        }
        .input-area {
            padding: 1rem;
            background: #0f3460;
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid #e94560;
        }
        input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            background: #1a1a2e;
            color: white;
            outline: none;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .status {
            font-size: 0.75rem;
            padding: 0.5rem;
            text-align: center;
            background: #0f3460;
            color: #888;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🤖 AI Assistant</h1>
        <p>Microsoft Phi-2 • Powered by Hugging Face</p>
    </div>
    <div class="messages" id="messages">
        <div class="message bot">👋 Hello! How can I help you today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message..." autofocus>
        <button id="sendBtn">Send</button>
    </div>
    <div id="status" class="status">✅ Connection Ready</div>
</div>

<script>
    // Configuration
    const HF_TOKEN = "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";
    const API_URL = "https://api-inference.huggingface.co/models/microsoft/phi-2";
    
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    function addMessage(text, isUser) {
        const msg = document.createElement('div');
        msg.className = `message ${isUser ? 'user' : 'bot'}`;
        msg.textContent = text;
        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function query(data) {
        const response = await fetch(API_URL, {
            headers: { 
                "Authorization": `Bearer ${HF_TOKEN}`,
                "Content-Type": "application/json"
            },
            method: "POST",
            body: JSON.stringify(data),
        });
        
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || "Failed to connect to AI");
        }
        return await response.json();
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, true);
        userInput.value = '';
        statusDiv.textContent = "⏳ AI is thinking...";

        try {
            const result = await query({
                inputs: text,
                parameters: {
                    max_new_tokens: 150,
                    temperature: 0.7,
                    return_full_text: false
                },
                options: {
                    wait_for_model: true,
                    use_cache: true
                }
            });

            const reply = result[0]?.generated_text || "I couldn't generate a response.";
            addMessage(reply.trim(), false);
            statusDiv.textContent = "✅ Ready";
        } catch (error) {
            addMessage("❌ Error: " + error.message, false);
            statusDiv.textContent = "❌ Connection Error";
        }
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });
</script>
</body>
</html>
