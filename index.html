<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Your AI Chatbot - Working!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            background: #16213e;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
        }
        .chat-header {
            background: #0f3460;
            padding: 1.2rem;
            text-align: center;
            color: white;
            border-bottom: 1px solid #e94560;
        }
        .chat-header h1 { font-size: 1.4rem; }
        .chat-header p { font-size: 0.8rem; opacity: 0.8; margin-top: 0.3rem; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            max-width: 75%;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user {
            background: #e94560;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.3rem;
        }
        .bot {
            background: #0f3460;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 0.3rem;
        }
        .input-area {
            padding: 1rem;
            background: #0f3460;
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid #e94560;
        }
        input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.97); }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            font-size: 0.75rem;
            padding: 0.5rem 1rem;
            text-align: center;
            background: #0a5c2e;
            color: white;
        }
        .status.error {
            background: #8b0000;
            color: white;
        }
        .status.loading {
            background: #1a3a5c;
            color: white;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f3460; }
        ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 3px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🤖 Your AI Chatbot</h1>
        <p>Powered by Hugging Face • Microsoft Phi-2</p>
    </div>
    <div class="messages" id="messages">
        <div class="message bot">👋 Hey! I'm your AI assistant. Ask me anything!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message and press Enter..." autofocus>
        <button id="sendBtn">Send</button>
    </div>
    <div class="status" id="status">✅ Ready to chat!</div>
</div>

<script>
    // ============================================
    // YOUR NEW TOKEN IS INSERTED HERE
    // ============================================
    const HF_TOKEN = "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";
    
    // Using Microsoft Phi-2 (works great, no special permissions needed)
    const API_URL = "https://api-inference.huggingface.co/models/microsoft/phi-2";
    
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    let isLoading = false;
    
    function addMessage(text, isUser) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
        messageDiv.textContent = text;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function addTypingIndicator() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.textContent = '🤔 Thinking...';
        typingDiv.id = 'typing-indicator';
        messagesDiv.appendChild(typingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function removeTypingIndicator() {
        const typing = document.getElementById('typing-indicator');
        if (typing) typing.remove();
    }
    
    async function sendMessage() {
        const userMessage = userInput.value.trim();
        if (!userMessage || isLoading) return;
        
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        
        addMessage(userMessage, true);
        addTypingIndicator();
        isLoading = true;
        statusDiv.textContent = "⏳ Calling API...";
        statusDiv.className = "status loading";
        
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: userMessage,
                    parameters: {
                        max_new_tokens: 200,
                        temperature: 0.7,
                        return_full_text: false
                    }
                })
            });
            
            removeTypingIndicator();
            
            if (response.status === 401) {
                throw new Error("Invalid token. Create a new READ token.");
            }
            
            if (response.status === 403) {
                throw new Error("Token access denied. Visit https://huggingface.co/microsoft/phi-2 and click 'Agree and access repository'");
            }
            
            if (response.status === 429) {
                throw new Error("Rate limit exceeded. Free tier: ~30 requests/hour. Wait a moment.");
            }
            
            if (response.status === 503) {
                throw new Error("Model is loading. Try again in 10 seconds.");
            }
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Error ${response.status}: ${errorText.substring(0, 100)}`);
            }
            
            const result = await response.json();
            
            let botReply = "";
            if (Array.isArray(result) && result[0] && result[0].generated_text) {
                botReply = result[0].generated_text;
            } else if (result.generated_text) {
                botReply = result.generated_text;
            } else {
                botReply = "I received a response but couldn't parse it. Please try again.";
            }
            
            if (!botReply || botReply.trim() === "") {
                botReply = "I'm not sure how to respond to that. Could you rephrase?";
            }
            
            addMessage(botReply, false);
            statusDiv.textContent = "✅ Ready";
            statusDiv.className = "status";
            
        } catch (error) {
            removeTypingIndicator();
            addMessage(`❌ ${error.message}`, false);
            statusDiv.textContent = `❌ ${error.message}`;
            statusDiv.className = "status error";
        } finally {
            isLoading = false;
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }
    
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
